project:
  name: ML-Enhanced Robust Equity Pairs Trading under Synthetic Market Regimes
  version: module3-proposal
  random_seed: 42

data:
  use_yfinance: false
  tickers: [KO, PEP, XOM, CVX, JPM, BAC, MSFT, AAPL, SPY, QQQ]
  start: '2021-01-01'
  end: '2026-06-30'
  frequency: daily
  fallback_days: 900
  base_pair: [KO, PEP]

pair_selection:
  min_abs_corr: 0.55
  max_cointegration_pvalue: 0.10
  top_n: 8

features:
  lookback_zscore: 30
  lookback_volatility: 20
  lookback_correlation: 60
  lookback_drawdown: 60
  half_life_lag: 1

labels:
  horizon_days: 10
  transaction_cost_bps: 2.0
  convergence_zscore: 0.25
  stop_loss_zscore: 3.0

backtest:
  entry_z: 1.5
  exit_z: 0.25
  stop_z: 3.0
  max_holding_days: 20
  transaction_cost_bps: 2.0
  slippage_bps: 1.0
  initial_capital: 1.0
  train_fraction: 0.70

models:
  random_state: 42
  probability_threshold: 0.55
  algorithms: [logistic_regression, random_forest]

synthetic:
  n_scenarios: 50
  scenario_length: 252
  seed: 42
  regimes:
    calm:
      vol_scale: 0.8
      jump_prob: 0.002
      mean_reversion_scale: 1.2
      corr_break_prob: 0.01
    high_vol:
      vol_scale: 1.5
      jump_prob: 0.01
      mean_reversion_scale: 0.9
      corr_break_prob: 0.02
    jump:
      vol_scale: 1.2
      jump_prob: 0.03
      mean_reversion_scale: 0.8
      corr_break_prob: 0.03
    weak_mean_reversion:
      vol_scale: 1.1
      jump_prob: 0.01
      mean_reversion_scale: 0.35
      corr_break_prob: 0.04
    stress:
      vol_scale: 2.2
      jump_prob: 0.05
      mean_reversion_scale: 0.25
      corr_break_prob: 0.10

outputs:
  dir: outputs
